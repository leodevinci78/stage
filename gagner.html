<!DOCTYPE html >
<html lang="fr" charset="utf-8">
<head>
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.0.2/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-EVSTQN3/azprG1Anm3QDgpJLIm9Nao0Yz1ztcQTwFspd3yD65VohhpuuCOmLASjC" crossorigin="anonymous">
<link rel="stylesheet" href="style.css"/>
<title>gagner 20$</title>
<link rel="icon" type="image/x-icone" href="logo Mans.jfif">
</head>
<body>







<!-- Button trigger modal -->
<button type="button" class="btn btn-primary" data-bs-toggle="modal" data-bs-target="#exampleModal">
  Tu es à 1 click de gagner 20$
</button>

<!-- Modal -->
<div class="modal fade" id="exampleModal" tabindex="-1" aria-labelledby="exampleModalLabel" aria-hidden="true">
  <div class="modal-dialog">
    <div class="modal-content">
      <div class="modal-header">
        <h1 class="modal-title fs-5" id="exampleModalLabel">Tu es tombé dans le panneau</h1>
        <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
      </div>
      <div class="modal-body">
        tu me dois 200$ maintenant
      </div>
      <div class="modal-footer">
        <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">vas en prison</button>
        <button type="button" class="btn btn-primary">payes</button>
      </div>
    </div>
  </div>
</div>

<div>

 <button id="fuyant" class="btn btn-danger position-absolute">
    exit
  </button>
</div>

<script>
const btn = document.getElementById("fuyant");

// Le bouton fuit la souris
btn.addEventListener("mouseover", () => {
  let x = Math.random() * (window.innerWidth - 120);
  let y = Math.random() * (window.innerHeight - 60);

  btn.style.left = x + "px";
  btn.style.top = y + "px";
});

// Si on arrive à cliquer dessus → quitte la page
btn.addEventListener("click", () => {
 window.location.href = "https://www.google.com";
});




</script>

 

 


<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js" integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI" crossorigin="anonymous"></script>
</body>
</html>
